name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: AnshikaM17
          outputs: dist/github-contribution-grid-snake.svg
          build_dir: dist

      - name: Push changes
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: dist/

      - name: Commit & Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Generate snake animation" || true
          git push
